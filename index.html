<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triggered-VLA Paper Map</title>
  <meta name="description" content="Triggered-VLA paper collection board" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-light">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-area">
        <div class="brand-title">Triggered-VLA Paper Map</div>
        <div class="brand-subtitle">Paper relationship map for Triggered-VLA</div>
      </div>

      <div class="toolbar">
        <button id="placeAllBtn" class="tool-btn" type="button">Place All</button>
        <button id="connectBtn" class="tool-btn" type="button">Connect</button>
        <button id="exportBtn" class="tool-btn" type="button">Export</button>
        <button id="importBtn" class="tool-btn" type="button">Import</button>
        <button id="resetBtn" class="tool-btn" type="button">Reset</button>
        <button id="darkBtn" class="tool-btn" type="button">Dark</button>
        <button id="fsBtn" class="tool-btn" type="button">FS</button>
      </div>
    </header>

    <main class="main-layout">
      <aside class="sidebar">
        <div class="search-panel">
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="Search papers..."
            autocomplete="off"
          />
        </div>

        <div class="sidebar-meta">
          <span id="paperCount">0 papers</span>
          <span id="boardCount">0 on board</span>
        </div>

        <div id="paperList" class="paper-list">
          <div class="paper-list-placeholder">Loading papers...</div>
        </div>
      </aside>

      <section class="board-section">
        <div class="board-topline">
          <div class="board-hint">Drag papers here or double-click to add text</div>

          <div class="board-zoom-controls">
            <button id="zoomOutBtn" class="tool-btn" type="button">-</button>
            <button id="zoomIndicator" class="tool-btn" type="button">100%</button>
            <button id="zoomInBtn" class="tool-btn" type="button">+</button>
          </div>
        </div>

        <div id="board" class="board" aria-label="Paper whiteboard">
          <div id="boardCanvas" class="board-canvas">
            <div class="board-grid"></div>

            <svg id="connectionSvg" class="connection-svg" xmlns="http://www.w3.org/2000/svg"></svg>

            <div id="boardItemsLayer" class="board-items-layer"></div>

            <div id="emptyBoardHint" class="empty-board-hint">
              Drag papers here or double-click to add text
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <input id="importFileInput" type="file" accept=".json,application/json" hidden />

  <div id="noteModal" class="modal hidden">
    <div class="modal-card small-modal">
      <div class="modal-header">
        <h2 id="noteModalTitle">Edit Note</h2>
        <button id="closeNoteModalBtn" class="icon-btn" type="button">×</button>
      </div>

      <div class="modal-body">
        <label class="field-label" for="noteTitleInput">Title</label>
        <input id="noteTitleInput" class="text-input" type="text" placeholder="Note title" />

        <label class="field-label" for="noteTextInput">Content</label>
        <textarea
          id="noteTextInput"
          class="textarea-input"
          placeholder="Write your note here..."
        ></textarea>
      </div>

      <div class="modal-footer">
        <button id="deleteNoteBtn" class="danger-btn" type="button">Delete</button>
        <button id="saveNoteBtn" class="primary-btn" type="button">Save</button>
      </div>
    </div>
  </div>

  <div id="paperModal" class="modal hidden">
    <div class="modal-card medium-modal">
      <div class="modal-header">
        <h2 id="paperModalTitle">Paper</h2>
        <button id="closePaperModalBtn" class="icon-btn" type="button">×</button>
      </div>

      <div class="modal-body">
        <div class="paper-modal-meta">
          <span id="paperModalVenue" class="meta-chip">Venue</span>
          <span id="paperModalYear" class="meta-chip">Year</span>
          <span id="paperModalTags" class="meta-chip">Tags</span>
        </div>

        <p id="paperModalAuthors" class="paper-modal-authors"></p>
        <p id="paperModalSummary" class="paper-modal-summary"></p>

        <div class="paper-modal-links">
          <a id="paperModalPdf" class="link-btn" href="#" target="_blank" rel="noopener noreferrer">PDF</a>
          <a id="paperModalProject" class="link-btn" href="#" target="_blank" rel="noopener noreferrer">Project</a>
          <a id="paperModalCode" class="link-btn" href="#" target="_blank" rel="noopener noreferrer">Code</a>
        </div>
      </div>

      <div class="modal-footer">
        <button id="removePaperFromBoardBtn" class="danger-btn" type="button">Remove</button>
        <button id="addPaperToBoardBtn" class="primary-btn" type="button">Add to Board</button>
      </div>
    </div>
  </div>

  <div id="exportModal" class="modal hidden">
    <div class="modal-card medium-modal">
      <div class="modal-header">
        <h2>Export Layout</h2>
        <button id="closeExportModalBtn" class="icon-btn" type="button">×</button>
      </div>

      <div class="modal-body">
        <textarea
          id="exportTextarea"
          class="textarea-input export-area"
          readonly
          placeholder="Exported layout JSON will appear here"
        ></textarea>
      </div>

      <div class="modal-footer">
        <button id="copyExportBtn" class="tool-btn" type="button">Copy</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden">Saved</div>

  <script src="app.js"></script>
</body>
</html>
